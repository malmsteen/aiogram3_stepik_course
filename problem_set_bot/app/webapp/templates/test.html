<!doctype html>
<html>
  <head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <button onclick="send()">Отправить тест</button>
    <script>
      let tg = window.Telegram.WebApp;
      tg.ready();
      function send() {
        tg.sendData(JSON.stringify({ test: "hello" }));
        tg.close();
      }
    </script>
  </body>
</html>
