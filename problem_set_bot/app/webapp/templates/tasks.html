<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body {
        font-family: system-ui;
        padding: 12px;
        background: var(--tg-theme-bg-color);
        color: var(--tg-theme-text-color);
      }
      .task {
        margin-bottom: 16px;
        padding: 8px;
        border-bottom: 1px solid var(--tg-theme-hint-color);
      }
      button {
        background: var(--tg-theme-button-color);
        color: var(--tg-theme-button-text-color);
        border: none;
        padding: 10px;
        border-radius: 8px;
        width: 100%;
        margin-top: 16px;
      }
      .checkbox {
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <h3>Задачи по теме {{ position }}</h3>
    <div id="tasks">
      {% for task in tasks %}
      <div class="task">
        <input
          type="checkbox"
          class="checkbox"
          data-id="{{ task.source_id }}"
          id="task_{{ task.source_id }}"
        />
        <label for="task_{{ task.source_id }}">{{ task.text[:150] }}...</label>
      </div>
      {% endfor %}
    </div>
    <button onclick="sendSelected()">
      Отправить выбранные задачи на печать
    </button>
    <script>
      let tg = window.Telegram.WebApp;
      tg.expand();
      function sendSelected() {
          const selected = Array.from(document.querySelectorAll('input:checked')).map(cb => cb.dataset.id);
          if (selected.length === 0) {
              tg.showAlert("Выберите хотя бы одну задачу");
              return;
          }
          tg.sendData(JSON.stringify({
              action: "select_tasks",
              user_id: {{ user_id }},
              position: {{ position }},
              task_ids: selected
          }));
          tg.close();
      }
    </script>
  </body>
</html>
